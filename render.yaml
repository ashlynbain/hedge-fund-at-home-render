# Public API for Hostinger static site + private learn UI.
services:
  - type: web
    name: hedge-fund-at-home-learn
    runtime: python
    plan: free
    buildCommand: |
      git clone --depth 1 https://github.com/ashlynbain/hedge-fund-at-home.git .toolkit
      cp .toolkit/config/config.yaml.example .toolkit/config/config.yaml
      pip install -e ".toolkit[dev]"
      pip install -e ".[dev]"
    startCommand: python -m hfah_site.cli.api_serve
    healthCheckPath: /api/config
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HFAH_TOOLKIT_ROOT
        value: .toolkit
      - key: HFAH_CONFIG
        value: .toolkit/config/config.yaml
      - key: HFAH_UI_QUIET
        value: "true"
