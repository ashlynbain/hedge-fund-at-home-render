# Public API for Hostinger static site + private learn UI.
services:
  - type: web
    name: hedge-fund-at-home-learn
    runtime: python
    plan: free
    buildCommand: bash scripts/render_build.sh
    startCommand: python -m hfah_site.cli.api_serve
    healthCheckPath: /api/config
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: HFAH_TOOLKIT_ROOT
        value: .toolkit
      - key: HFAH_CONFIG
        value: .toolkit/config/config.yaml
      - key: PYTHONPATH
        value: /opt/render/project/src/.toolkit
      - key: HFAH_UI_QUIET
        value: "true"
